name: Deploy to GitHub Pages

on:
  # 30분 수집 워크플로가 성공할 때마다 최신 data.json으로 정적 페이지를 재배포한다.
  workflow_run:
    workflows: ["Collect SECOM Data"]
    types: [completed]
  # Actions 화면에서 즉시 수동 갱신할 수 있다.
  workflow_dispatch:
  # 대시보드 UI 변경도 바로 정적 페이지에 반영한다.
  push:
    branches: [main]
    paths:
      - 'dashboard/public/**'
      - 'dashboard/server.js'
      - 'dashboard/scripts/**'
      - 'dashboard/package.json'
      - 'dashboard/package-lock.json'
      - '.github/workflows/pages.yml'

permissions:
  contents: read
  actions: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        working-directory: dashboard
        run: npm ci

      - name: Download latest collection artifact
        if: ${{ github.event_name == 'workflow_run' }}
        uses: actions/download-artifact@v4
        with:
          name: secom-data-${{ github.event.workflow_run.id }}
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path: dashboard/artifacts

      # push 또는 workflow_dispatch 실행에는 연결된 수집 아티팩트가 없으므로 Secret으로 즉시 수집한다.
      - name: Collect data for direct deployment
        if: ${{ github.event_name != 'workflow_run' }}
        working-directory: dashboard
        env:
          PORT: 3001
          CODYSSEY_SESSION: ${{ secrets.CODYSSEY_SESSION }}
          TZ: Asia/Seoul
        run: |
          set -euo pipefail
          mkdir -p artifacts
          if [ -z "$CODYSSEY_SESSION" ]; then
            echo "::warning::CODYSSEY_SESSION이 없어 앱 UI만 먼저 배포합니다. Secret 등록 후 실제 데이터로 자동 갱신됩니다."
            node - <<'NODE'
          const now = new Date();
          const kst = new Date(now.getTime() + 9 * 60 * 60 * 1000);
          const year = kst.getUTCFullYear();
          const month = kst.getUTCMonth() + 1;
          const guildIds = [3, 4, 5, 6];
          const guilds = guildIds.map(guildId => ({ guildId, guildName: `길드 ${guildId}` }));
          const data = {
            placeholder: true,
            meta: { year, month, guildIds, guildScope: 'fixed-3-6', guilds,
                    totalMembers: 0, totalActiveMembers: 0, collectedAt: now.toISOString() },
            members: [], topMembers: [], daily: [], weekly: [],
            hourly: Array.from({length: 24}, (_, hour) => ({hour, label: `${String(hour).padStart(2,'0')}:00`, totalPersonSeconds: 0, totalPersonHours: 0})),
            weekday: ['일','월','화','수','목','금','토'].map((dayName, day) => ({day, dayName, totalSeconds: 0, totalHours: 0})),
            records: {topDayByAttendance: null, topDayByHours: null, topWeek: null, peakHour: null},
            currentlyInside: []
          };
          require('fs').writeFileSync('artifacts/latest.json', JSON.stringify(data));
          NODE
            exit 0
          fi

          node server.js > /tmp/server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill "$SERVER_PID" 2>/dev/null || true' EXIT

          for i in $(seq 1 20); do
            if curl --silent --fail http://localhost:3001/api/session > /tmp/session.json; then
              break
            fi
            sleep 1
          done

          LOGGED_IN=$(node -e "const d=require('/tmp/session.json'); process.stdout.write(String(d.loggedIn === true))")
          if [ "$LOGGED_IN" != "true" ]; then
            echo "::error::CODYSSEY_SESSION이 없거나 만료되었습니다."
            cat /tmp/server.log
            exit 1
          fi

          NOW_YEAR=$(date +%Y)
          NOW_MONTH=$(date +%m)
          curl --silent --show-error --fail-with-body \
            --max-time 180 \
            -X POST http://localhost:3001/api/aggregate \
            -H "Content-Type: application/json" \
            -d "{\"year\":$NOW_YEAR,\"month\":$((10#$NOW_MONTH))}" \
            -o artifacts/latest.json

      - name: Validate collected data
        working-directory: dashboard
        run: |
          node - <<'NODE'
          const data = require('./artifacts/latest.json');
          if (data.error || !data.meta || !Array.isArray(data.members)) {
            throw new Error(data.error || '수집 데이터 형식이 올바르지 않습니다.');
          }
          const ids = (data.meta.guildIds || []).join(',');
          if (ids !== '3,4,5,6') throw new Error(`잘못된 길드 범위: ${ids}`);
          if (!Array.isArray(data.meta.guilds) || data.meta.guilds.length !== 4) {
            throw new Error(`3·4·5·6길드 중 일부 조회 실패: ${data.meta.guilds && data.meta.guilds.length || 0}/4`);
          }
          console.log(`정적 페이지 데이터 확인: 길드 4개, 멤버 ${data.members.length}명`);
          NODE

      - name: Build static dashboard
        working-directory: dashboard
        run: |
          rm -rf _site
          mkdir -p _site

          # GitHub Pages 루트는 소개 페이지가 아닌 app.html 정적 대시보드로 제공한다.
          cp public/app.html _site/index.html
          cp public/app.html _site/app.html
          node scripts/sanitize-for-public.js artifacts/latest.json _site/data.json
          touch _site/.nojekyll

          test -s _site/index.html
          test -s _site/data.json

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: dashboard/_site

      - name: Deploy static dashboard
        id: deployment
        uses: actions/deploy-pages@v4
