# 3·4·5·6 길드 SECOM 데이터를 30분마다 수집한다.
# 인증은 Repository Secret `CODYSSEY_SESSION`의 JSESSIONID만 사용한다.
# 완료 후 업로드한 아티팩트는 `Deploy to GitHub Pages` 워크플로가 받아 정적 페이지를 갱신한다.
name: Collect SECOM Data

on:
  schedule:
    # GitHub cron은 UTC 기준이며, 매시 00분/30분에 실행된다.
    - cron: '*/30 * * * *'
    # 스케줄러 누락 대비 다중 스트림 (2026-07-18 공백 관측, 실측 평균 배달 82~110분)
    # 30분 슬롯당 발화 기회 4회로 확대
    - cron: '5,35 * * * *'
    - cron: '11,41 * * * *'
    - cron: '17,47 * * * *'
  workflow_dispatch:
    inputs:
      backfill_from:
        description: '월별 공개 기록 백필 시작월 (YYYY-MM, 비우면 현재 월만)'
        required: false
        default: ''
        type: string

permissions:
  contents: read

concurrency:
  group: collect-secom
  cancel-in-progress: true

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        working-directory: dashboard
        run: npm ci

      # 로스터(길드 멤버 mbrId·이름·레벨·프로필)는 준정적 데이터라
      # actions/cache에 보관해 두고 8시간 이내이면 길드 API를 생략한다.
      # 키 접두어 v2: 이전 캐시에 email이 포함되어 있어 키를 교체했다 (이전 캐시는 미사용 기간 후 GitHub가 자동 만료).
      - name: Restore roster cache
        uses: actions/cache/restore@v4
        with:
          path: dashboard/.roster-cache
          key: secom-roster-v2-${{ github.run_id }}
          restore-keys: secom-roster-v2-

      # 공유 로스터 허브(비공개)의 최신본이 신선하면 actions/cache 로스터를 덮어쓴다.
      # 페치 구현은 codyssey_commons(공개)에서 받아 실행 — 허브 구조 변경 시 한 곳만 고친다.
      # 실패/만료 시 조용히 폐기해 기존 캐시 → 길드 API 경로를 탄다.
      - name: Fetch shared roster from hub
        working-directory: dashboard
        env:
          HUB_PAT: ${{ secrets.HUB_PAT }}
        run: |
          if ! curl -sfL https://raw.githubusercontent.com/giyeop-cody/codyssey_commons/main/roster/fetch_hub_roster.cjs -o /tmp/fetch_hub_roster.cjs; then
            echo "::notice::페처 다운로드 실패 — 자체 경로 사용"
            exit 0
          fi
          node /tmp/fetch_hub_roster.cjs --mode jail --file .roster-cache/roster.json

      - name: Verify session secret
        env:
          CODYSSEY_SESSION: ${{ secrets.CODYSSEY_SESSION }}
        run: |
          if [ -z "$CODYSSEY_SESSION" ]; then
            echo "::error::Repository Secret CODYSSEY_SESSION이 설정되지 않았습니다."
            exit 1
          fi

      - name: Collect merged guild data
        working-directory: dashboard
        env:
          PORT: 3000
          CODYSSEY_SESSION: ${{ secrets.CODYSSEY_SESSION }}
          BACKFILL_FROM: ${{ github.event.inputs.backfill_from || '' }}
          SECOM_ROSTER_FILE: .roster-cache/roster.json
          SECOM_ROSTER_MAX_AGE_H: '8'
          TZ: Asia/Seoul
        run: |
          set -euo pipefail
          mkdir -p artifacts

          node server.js > /tmp/server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill "$SERVER_PID" 2>/dev/null || true' EXIT

          for i in $(seq 1 20); do
            if curl --silent --fail http://localhost:3000/api/session > /tmp/session.json; then
              break
            fi
            sleep 1
          done

          LOGGED_IN=$(node -e "const d=require('/tmp/session.json'); process.stdout.write(String(d.loggedIn === true))")
          if [ "$LOGGED_IN" != "true" ]; then
            echo "::error::CODYSSEY_SESSION이 없거나 만료되었습니다. 대시보드에서 다시 로그인해 Secret을 갱신하세요."
            cat /tmp/server.log
            exit 1
          fi

          NOW_YEAR=$(date +%Y)
          NOW_MONTH=$(date +%m)
          NOW_STAMP=$(date +%Y%m%dT%H%M%S%z)
          mkdir -p artifacts/months

          TARGET_MONTHS=$(node - <<'NODE'
          const now = new Date(Date.now() + 9 * 60 * 60 * 1000);
          const endYear = now.getUTCFullYear();
          const endMonth = now.getUTCMonth() + 1;
          const raw = (process.env.BACKFILL_FROM || '').trim();
          let startYear = endYear, startMonth = endMonth;
          if (raw) {
            const match = /^(\d{4})-(0[1-9]|1[0-2])$/.exec(raw);
            if (!match) throw new Error('backfill_from은 YYYY-MM 형식이어야 합니다.');
            startYear = Number(match[1]);
            startMonth = Number(match[2]);
          }
          const startIndex = startYear * 12 + startMonth - 1;
          const endIndex = endYear * 12 + endMonth - 1;
          if (startIndex > endIndex) throw new Error('backfill_from은 현재 월보다 미래일 수 없습니다.');
          if (endIndex - startIndex >= 24) throw new Error('한 번에 최대 24개월까지만 백필할 수 있습니다.');
          const months = [];
          for (let i = startIndex; i <= endIndex; i++) {
            const year = Math.floor(i / 12);
            const month = i % 12 + 1;
            months.push(`${year}-${String(month).padStart(2, '0')}`);
          }
          process.stdout.write(months.join(' '));
          NODE
          )

          echo "수집 대상 월: ${TARGET_MONTHS}, guilds=[3,4,5,6] (고정 통합)"
          for YM in $TARGET_MONTHS; do
            YEAR=${YM%-*}
            MONTH=${YM#*-}
            OUTPUT="artifacts/months/${YM}.json"
            echo "수집 요청: ${YM}"

            curl --silent --show-error --fail-with-body \
              --max-time 180 \
              -X POST http://localhost:3000/api/aggregate \
              -H "Content-Type: application/json" \
              -d "{\"year\":$YEAR,\"month\":$((10#$MONTH))}" \
              -o "$OUTPUT"

            node - "$OUTPUT" <<'NODE'
          const file = process.argv[2];
          const data = require(require('path').resolve(file));
          if (data.error || !data.meta || !Array.isArray(data.members)) {
            throw new Error(data.error || `수집 데이터 형식 오류: ${file}`);
          }
          const ids = (data.meta.guildIds || []).join(',');
          if (ids !== '3,4,5,6') throw new Error(`잘못된 길드 범위: ${ids}`);
          if (!Array.isArray(data.meta.guilds) || data.meta.guilds.length !== 4) {
            throw new Error(`3·4·5·6길드 중 일부 조회 실패: ${data.meta.guilds && data.meta.guilds.length || 0}/4`);
          }
          console.log(`${data.meta.year}-${String(data.meta.month).padStart(2,'0')} 완료: ${data.meta.totalActiveMembers}/${data.meta.totalMembers}명 활동`);
          NODE
          done

          CURRENT_KEY="${NOW_YEAR}-${NOW_MONTH}"
          cp "artifacts/months/${CURRENT_KEY}.json" artifacts/latest.json
          cp artifacts/latest.json "artifacts/secom_${NOW_YEAR}-${NOW_MONTH}_${NOW_STAMP}.json"

      # 로스터 캐시 사용 여부는 서버 로그에서 확인 가능해야 한다.
      - name: Show roster cache decision
        run: grep -E "\[roster\]|\[season\]" /tmp/server.log || echo "로스터 로그 라인 없음"

      - name: Upload collected data
        uses: actions/upload-artifact@v4
        with:
          name: secom-data-${{ github.run_id }}
          path: dashboard/artifacts/
          if-no-files-found: error
          retention-days: 7

      - name: Save roster cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: dashboard/.roster-cache
          key: secom-roster-v2-${{ github.run_id }}
