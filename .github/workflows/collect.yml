# 3·4·5·6 길드 SECOM 데이터를 30분마다 수집한다.
# 인증은 Repository Secret `CODYSSEY_SESSION`의 JSESSIONID만 사용한다.
# 완료 후 업로드한 아티팩트는 `Deploy to GitHub Pages` 워크플로가 받아 정적 페이지를 갱신한다.
name: Collect SECOM Data

on:
  schedule:
    # GitHub cron은 UTC 기준이며, 매시 00분/30분에 실행된다.
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: collect-secom
  cancel-in-progress: true

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: dashboard/package-lock.json

      - name: Install dependencies
        working-directory: dashboard
        run: npm ci

      - name: Verify session secret
        env:
          CODYSSEY_SESSION: ${{ secrets.CODYSSEY_SESSION }}
        run: |
          if [ -z "$CODYSSEY_SESSION" ]; then
            echo "::error::Repository Secret CODYSSEY_SESSION이 설정되지 않았습니다."
            exit 1
          fi

      - name: Collect merged guild data
        working-directory: dashboard
        env:
          PORT: 3000
          CODYSSEY_SESSION: ${{ secrets.CODYSSEY_SESSION }}
          TZ: Asia/Seoul
        run: |
          set -euo pipefail
          mkdir -p artifacts

          node server.js > /tmp/server.log 2>&1 &
          SERVER_PID=$!
          trap 'kill "$SERVER_PID" 2>/dev/null || true' EXIT

          for i in $(seq 1 20); do
            if curl --silent --fail http://localhost:3000/api/session > /tmp/session.json; then
              break
            fi
            sleep 1
          done

          LOGGED_IN=$(node -e "const d=require('/tmp/session.json'); process.stdout.write(String(d.loggedIn === true))")
          if [ "$LOGGED_IN" != "true" ]; then
            echo "::error::CODYSSEY_SESSION이 없거나 만료되었습니다. 대시보드에서 다시 로그인해 Secret을 갱신하세요."
            cat /tmp/server.log
            exit 1
          fi

          NOW_YEAR=$(date +%Y)
          NOW_MONTH=$(date +%m)
          NOW_STAMP=$(date +%Y%m%dT%H%M%S%z)
          echo "수집 요청: ${NOW_YEAR}-${NOW_MONTH}, guilds=[3,4,5,6] (고정 통합)"

          curl --silent --show-error --fail-with-body \
            --max-time 180 \
            -X POST http://localhost:3000/api/aggregate \
            -H "Content-Type: application/json" \
            -d "{\"guildIds\":[3,4,5,6],\"year\":$NOW_YEAR,\"month\":$((10#$NOW_MONTH))}" \
            -o artifacts/latest.json

          node - <<'NODE'
          const data = require('./artifacts/latest.json');
          if (data.error) throw new Error(data.error);
          const ids = (data.meta && data.meta.guildIds || []).join(',');
          if (ids !== '3,4,5,6') throw new Error(`잘못된 길드 범위: ${ids}`);
          if (!Array.isArray(data.meta.guilds) || data.meta.guilds.length !== 4) {
            throw new Error(`3·4·5·6길드 중 일부 조회 실패: ${data.meta.guilds && data.meta.guilds.length || 0}/4`);
          }
          console.log(`수집 완료: ${data.meta.totalActiveMembers}/${data.meta.totalMembers}명 활동, 길드 4개 통합`);
          NODE

          cp artifacts/latest.json "artifacts/secom_${NOW_YEAR}-${NOW_MONTH}_${NOW_STAMP}.json"

      - name: Upload collected data
        uses: actions/upload-artifact@v4
        with:
          name: secom-data-${{ github.run_id }}
          path: dashboard/artifacts/
          if-no-files-found: error
          retention-days: 7
