# GitHub Actions - SECOM 데이터 주기 수집 (대시보드 로그인 자동 연동 버전)
#
# === 작동 방식 ===
#  1) Actions Cache 에서 세션 쿠키 파일 복원 시도
#  2) 없으면 Secrets CODYSSEY_SESSION 값을 초기 세션으로 사용
#     - 이 값은 대시보드에서 로그인할 때마다 자동으로 최신값으로 갱신됨
#       (서버가 GitHub API로 Secret을 업데이트)
#  3) 세션이 만료되었으면 실패 → 대시보드/수동 실행에서 새로 로그인 시 자동 반영
#
# === 설정 방법 ===
# 1. GitHub Personal Access Token(classic, `repo` 스코프)을 발급받아
#    리포 Secret에 GITHUB_TOKEN_SYNC 라는 이름으로 등록
#    (기본 GITHUB_TOKEN은 Secret 수정 권한이 없어서 별도 PAT 필요)
#    * 코드스페이스에서 실행 중이면 GITHUB_TOKEN 환경변수로도 넣어줄 수 있음
# 2. 대시보드 서버 기동 시 환경변수로 다음을 설정:
#      GITHUB_TOKEN=<PAT>
#      GITHUB_REPOSITORY=<owner>/<repo>
#      (Codespaces에서는 Codespaces가 자동으로 둘 다 주입)
# 3. 대시보드에 로그인하면 자동으로 CODYSSEY_SESSION Secret이 갱신됨
#
# === Secrets ===
#   - GITHUB_TOKEN_SYNC : (필수?) Secret 쓸 권한 있는 PAT. 대시보드에서 자동으로
#                         세션을 Secret에 올려주려면 필요.
#                         없으면 수동으로 JSESSIONID 입력으로 갱신 가능.
#   - CODYSSEY_GUILDS   : (옵션) 길드 ID 콤마 구분. 미설정 시 기본값 3,4,5,6 사용

name: Collect SECOM Data

on:
  schedule:
    - cron: '5 * * * *'
  workflow_dispatch:
    inputs:
      jsessionid:
        description: '새 JSESSIONID (대시보드에서 로그인하면 자동 갱신되므로 평소 비워두세요)'
        required: false
        type: string
      guilds:
        description: '길드 ID (비워두면 기본값 3,4,5,6 사용)'
        required: false
        default: ''
        type: string

jobs:
  collect:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: dashboard
        run: npm install

      - name: Restore session cookie cache
        uses: actions/cache/restore@v4
        id: cookie-cache
        with:
          path: dashboard/.session-cookies.json
          key: secom-session-${{ github.repository }}-${{ github.run_id }}
          restore-keys: |
            secom-session-${{ github.repository }}-

      - name: Bootstrap session from secret (when no cache)
        if: steps.cookie-cache.outputs.cache-hit != 'true'
        working-directory: dashboard
        env:
          INITIAL_SESSION: ${{ secrets.CODYSSEY_SESSION }}
        run: |
          if [ -n "$INITIAL_SESSION" ]; then
            echo "→ 캐시가 없어 CODYSSEY_SESSION 시크릿으로 세션 초기화"
            node -e "
            const fs=require('fs');
            fs.writeFileSync('.session-cookies.json', JSON.stringify({
              cookies:{JSESSIONID:{name:'JSESSIONID',value:process.env.INITIAL_SESSION,domain:'.codyssey.kr',path:'/',secure:true,httpOnly:true,sameSite:'None'}},
              userId:'ci',
              loggedInAt:new Date().toISOString(),
              autoLoginTried:false
            }, null, 2));
            "
          else
            echo "::warning::캐시와 CODYSSEY_SESSION 시크릿이 모두 없습니다."
            echo "::warning::대시보드에서 로그인하면 자동으로 시크릿이 생성됩니다."
          fi

      - name: Apply manual JSESSIONID override
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.jsessionid != '' }}
        working-directory: dashboard
        env:
          NEW_JSESSIONID: ${{ inputs.jsessionid }}
        run: |
          node -e "
          const fs=require('fs');
          fs.writeFileSync('.session-cookies.json', JSON.stringify({
            cookies:{JSESSIONID:{name:'JSESSIONID',value:process.env.NEW_JSESSIONID,domain:'.codyssey.kr',path:'/',secure:true,httpOnly:true,sameSite:'None'}},
            userId:'manual',
            loggedInAt:new Date().toISOString(),
            autoLoginTried:false
          }, null, 2));
          "
          echo "→ 수동 입력 JSESSIONID로 세션 덮어쓰기 완료"

      - name: Determine guild IDs
        id: guilds
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ inputs.guilds }}" ]; then
            echo "guilds=${{ inputs.guilds }}" >> $GITHUB_OUTPUT
          elif [ -n "${{ secrets.CODYSSEY_GUILDS }}" ]; then
            echo "guilds=${{ secrets.CODYSSEY_GUILDS }}" >> $GITHUB_OUTPUT
          else
            echo "guilds=3,4,5,6" >> $GITHUB_OUTPUT
          fi

      - name: Start server & collect
        working-directory: dashboard
        env:
          PORT: 3000
          GUILDS: ${{ steps.guilds.outputs.guilds }}
        run: |
          mkdir -p artifacts
          node server.js > /tmp/server.log 2>&1 &
          SERVER_PID=$!
          sleep 4
          echo "=== 세션 상태 ==="
          curl -s http://localhost:3000/api/session
          echo ""
          LOGGED_IN=$(curl -s http://localhost:3000/api/session | node -pe "JSON.parse(require('fs').readFileSync('/dev/stdin','utf8')).loggedIn")
          if [ "$LOGGED_IN" != "true" ]; then
            echo ""
            echo "::error::세션이 없거나 만료되었습니다."
            echo "::error::대시보드에 로그인하면 자동으로 갱신됩니다. (또는 수동으로 jsessionid 입력)"
            cat /tmp/server.log
            kill $SERVER_PID 2>/dev/null
            exit 1
          fi

          NOW_YEAR=$(date -u +%Y)
          NOW_MONTH=$(date -u +%m)
          GUILDS_JSON=$(node -pe "JSON.stringify(process.env.GUILDS.split(',').map(s=>parseInt(s.trim(),10)).filter(n=>n))")
          echo "요청: year=$NOW_YEAR month=$((10#$NOW_MONTH)) guilds=$GUILDS_JSON"

          curl -s -X POST http://localhost:3000/api/aggregate \
            -H "Content-Type: application/json" \
            -d "{\"guildIds\":$GUILDS_JSON,\"year\":$NOW_YEAR,\"month\":$((10#$NOW_MONTH))}" \
            -o artifacts/latest.json \
            --max-time 180

          if ! node -e "
            const d=require('./artifacts/latest.json');
            if(d.error) throw new Error(d.error);
            console.log('✅ 수집 완료:', d.meta.totalActiveMembers,'/',d.meta.totalMembers,'명 활동');
          "; then
            echo "::error::집계 실패"
            cat artifacts/latest.json
            kill $SERVER_PID 2>/dev/null
            exit 1
          fi
          cp artifacts/latest.json "artifacts/secom_${NOW_YEAR}-${NOW_MONTH}_$(date -u +%Y%m%dT%H%M%SZ).json"
          kill $SERVER_PID 2>/dev/null

      - name: Save session cookie cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: dashboard/.session-cookies.json
          key: secom-session-${{ github.repository }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Upload data artifacts
        uses: actions/upload-artifact@v4
        with:
          name: secom-data-${{ github.run_id }}
          path: dashboard/artifacts/
          retention-days: 90
